<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>腿部拉伸计时器</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1d2e">
<meta name="description" content="简洁的腿部拉伸计时器">

<!-- iOS Safari 添加到主屏幕支持 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="腿部拉伸">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    background: linear-gradient(160deg, #1a1d2e 0%, #2b2f4a 100%);
    color: #f2f2f7;
    overflow: hidden;
    user-select: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: calc(env(safe-area-inset-top, 0px) + 16px) 24px calc(env(safe-area-inset-bottom, 0px) + 16px);
  }
  .app {
    width: 100%;
    max-width: 480px;
    height: 100%;
    max-height: 860px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 32px 0;
  }
  .header {
    text-align: center;
    letter-spacing: 2px;
    opacity: 0.75;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 500;
  }

  /* 主圈 */
  .main {
    flex: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .ring-wrap {
    position: relative;
    width: 300px;
    height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  svg.ring {
    position: absolute;
    inset: 0;
    transform: rotate(-90deg);
  }
  .ring-bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 8; }
  .ring-fg {
    fill: none;
    stroke: url(#grad);
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.3s linear, stroke 0.3s;
  }
  .ring-rest .ring-fg { stroke: #ffb84d; }

  .center {
    position: relative;
    text-align: center;
    z-index: 2;
  }
  .stage-label {
    font-size: 14px;
    letter-spacing: 4px;
    opacity: 0.6;
    margin-bottom: 8px;
    min-height: 18px;
  }
  .action-name {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 12px;
    min-height: 32px;
  }
  .time {
    font-size: 72px;
    font-weight: 200;
    font-variant-numeric: tabular-nums;
    letter-spacing: -2px;
    line-height: 1;
  }
  .target {
    font-size: 13px;
    opacity: 0.55;
    margin-top: 10px;
    letter-spacing: 2px;
    min-height: 18px;
  }

  /* 开始按钮 */
  .start-btn {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #6d8cff, #9d6dff);
    color: #fff;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 6px;
    cursor: pointer;
    box-shadow: 0 20px 50px rgba(109, 140, 255, 0.35);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .start-btn:active { transform: scale(0.96); }

  /* 下一动作提示 */
  .next-hint {
    font-size: 13px;
    opacity: 0.5;
    margin-top: 18px;
    min-height: 18px;
    letter-spacing: 1px;
  }

  /* 进度点 */
  .dots {
    display: flex;
    gap: 8px;
    margin-top: 24px;
  }
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: all 0.3s;
  }
  .dot.active { background: #9d6dff; transform: scale(1.3); }
  .dot.done { background: rgba(157, 109, 255, 0.5); }

  /* 控制按钮 */
  .controls {
    display: flex;
    gap: 16px;
    margin-top: 24px;
    width: 100%;
    justify-content: center;
  }
  .ctrl {
    min-width: 92px;
    height: 48px;
    padding: 0 18px;
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: #f2f2f7;
    font-size: 15px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    backdrop-filter: blur(10px);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .ctrl:active { transform: scale(0.95); }
  .ctrl.primary {
    background: linear-gradient(135deg, #6d8cff, #9d6dff);
    border-color: transparent;
  }
  .ctrl.danger {
    border-color: rgba(255, 90, 95, 0.4);
    color: #ff7a7f;
  }
  .ctrl:disabled { opacity: 0.3; cursor: not-allowed; }

  .hint-text {
    margin-top: 10px;
    font-size: 11px;
    opacity: 0.35;
    letter-spacing: 2px;
  }

  /* 长按反馈 */
  .ctrl.holding {
    background: rgba(255, 90, 95, 0.25);
    position: relative;
    overflow: hidden;
  }
  .ctrl.holding::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255, 90, 95, 0.35);
    width: var(--hold, 0%);
    transition: width 0.05s linear;
  }

  .hidden { display: none !important; }
  .fade-in { animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .countdown-big {
    font-size: 140px !important;
    font-weight: 100;
    color: #ffb84d;
    animation: pop 0.8s ease;
  }
  @keyframes pop {
    0% { transform: scale(0.6); opacity: 0; }
    60% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); }
  }

  .finish-screen {
    text-align: center;
  }
  .finish-screen .emoji { font-size: 64px; margin-bottom: 16px; }
  .finish-screen .msg {
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 8px;
  }
  .finish-screen .sub {
    font-size: 14px;
    opacity: 0.6;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>腿 部 拉 伸</h1>
  </div>

  <!-- 开始页 -->
  <div class="main" id="home">
    <button class="start-btn" id="startBtn">开始拉伸</button>
    <div class="next-hint">共 8 个动作 · 约 6 分钟</div>
  </div>

  <!-- 运行页 -->
  <div class="main hidden" id="run">
    <div class="ring-wrap" id="ringWrap">
      <svg class="ring" viewBox="0 0 300 300">
        <defs>
          <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6d8cff"/>
            <stop offset="100%" stop-color="#9d6dff"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="150" cy="150" r="140"/>
        <circle class="ring-fg" id="ringFg" cx="150" cy="150" r="140"
                stroke-dasharray="879.6" stroke-dashoffset="0"/>
      </svg>
      <div class="center">
        <div class="stage-label" id="stageLabel"></div>
        <div class="action-name" id="actionName">准备</div>
        <div class="time" id="timeDisplay">3</div>
        <div class="target" id="targetLabel"></div>
      </div>
    </div>
    <div class="next-hint" id="nextHint"></div>
    <div class="dots" id="dots"></div>
    <div class="controls">
      <button class="ctrl danger" id="stopBtn">停止</button>
      <button class="ctrl primary" id="pauseBtn">暂停</button>
      <button class="ctrl" id="nextBtn">下一个</button>
    </div>
  </div>

  <!-- 完成页 -->
  <div class="main hidden" id="finish">
    <div class="finish-screen fade-in">
      <div class="emoji">🎉</div>
      <div class="msg" id="finishMsg">太棒了，你完成了！</div>
      <div class="sub">愿你的双腿轻盈自在</div>
    </div>
    <button class="ctrl primary" id="againBtn" style="margin-top: 40px; min-width: 180px;">再来一次</button>
  </div>
</div>

<script>
const stretches = [
  { name: '站立单腿前屈（左）', duration: 45, target: '大腿后侧' },
  { name: '站立单腿前屈（右）', duration: 45, target: '大腿后侧' },
  { name: '站姿抓脚背（左）',   duration: 45, target: '大腿前侧' },
  { name: '站姿抓脚背（右）',   duration: 45, target: '大腿前侧' },
  { name: '侧弓步（左）',       duration: 45, target: '大腿内侧' },
  { name: '侧弓步（右）',       duration: 45, target: '大腿内侧' },
  { name: '站立体前屈',         duration: 45, target: '整体后侧' },
  { name: '全身抖动放松',       duration: 30, target: '肌肉放松' },
];
const REST_SECONDS = 5;
const ENCOURAGEMENTS = [
  '太棒了，你完成了全部拉伸！',
  '坚持就是胜利，做得很好！',
  '你又变得更灵活了一点！',
  '辛苦啦，好好感受身体的放松吧！',
];

// 元素
const $ = id => document.getElementById(id);
const home = $('home'), run = $('run'), finish = $('finish');
const ringWrap = $('ringWrap'), ringFg = $('ringFg');
const stageLabel = $('stageLabel'), actionName = $('actionName');
const timeDisplay = $('timeDisplay'), targetLabel = $('targetLabel');
const nextHint = $('nextHint'), dots = $('dots');
const pauseBtn = $('pauseBtn'), stopBtn = $('stopBtn'), nextBtn = $('nextBtn');

const RING_CIRC = 879.6; // 2 * PI * 140

// 状态
let state = {
  idx: 0,          // 当前动作索引
  phase: 'idle',   // idle | prep | rest | action | done
  remaining: 0,
  total: 0,
  paused: false,
  tickerId: null,
  lastTs: 0,
  countedDown: new Set(),
};

// 渲染进度点
function renderDots() {
  dots.innerHTML = '';
  stretches.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i < state.idx ? ' done' : i === state.idx && state.phase === 'action' ? ' active' : '');
    dots.appendChild(d);
  });
}

// 语音
let voice = null;
function initVoice() {
  if (!('speechSynthesis' in window)) return;
  const pick = () => {
    const vs = speechSynthesis.getVoices();
    voice = vs.find(v => /zh|Chinese|普通话/i.test(v.lang + v.name)) || vs[0] || null;
  };
  pick();
  speechSynthesis.onvoiceschanged = pick;
}
function speak(text, opts = {}) {
  if (!('speechSynthesis' in window)) return;
  try {
    if (opts.interrupt) speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';
    if (voice) u.voice = voice;
    u.rate = opts.rate || 1;
    u.pitch = opts.pitch || 1;
    u.volume = 1;
    speechSynthesis.speak(u);
  } catch (e) { /* ignore */ }
}

// 提示音（短促）
let audioCtx = null;
function beep(freq = 880, duration = 0.12, volume = 0.15) {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
  } catch (e) {}
}

// 更新环形进度
function updateRing() {
  const pct = state.total > 0 ? state.remaining / state.total : 0;
  ringFg.setAttribute('stroke-dashoffset', String(RING_CIRC * (1 - pct)));
}

// 显示剩余秒数（向上取整，但最后一秒显示0）
function displaySeconds() {
  return Math.ceil(state.remaining);
}

// 进入某阶段
function enterPhase(phase) {
  state.phase = phase;
  state.countedDown = new Set();
  if (phase === 'prep') {
    ringWrap.classList.remove('ring-rest');
    state.total = 3; state.remaining = 3;
    stageLabel.textContent = '准 备';
    actionName.textContent = '即将开始';
    targetLabel.textContent = '';
    nextHint.textContent = '下一个：' + stretches[0].name;
    timeDisplay.classList.add('countdown-big');
    speak('准备开始腿部拉伸', { interrupt: true });
  } else if (phase === 'rest') {
    ringWrap.classList.add('ring-rest');
    state.total = REST_SECONDS; state.remaining = REST_SECONDS;
    const next = stretches[state.idx];
    stageLabel.textContent = '休 息';
    actionName.textContent = '下一个：' + next.name;
    targetLabel.textContent = next.target;
    nextHint.textContent = '共 ' + stretches.length + ' 个 · 当前第 ' + (state.idx + 1);
    timeDisplay.classList.remove('countdown-big');
    speak('休息五秒，准备 ' + next.name, { interrupt: true });
  } else if (phase === 'action') {
    ringWrap.classList.remove('ring-rest');
    const s = stretches[state.idx];
    state.total = s.duration; state.remaining = s.duration;
    stageLabel.textContent = '拉 伸 中';
    actionName.textContent = s.name;
    targetLabel.textContent = s.target;
    const nxt = stretches[state.idx + 1];
    nextHint.textContent = nxt ? '下一个：' + nxt.name : '最后一个动作';
    timeDisplay.classList.remove('countdown-big');
    // 清晰的开始提示音（比倒计时音更响更长）
    beep(1046, 0.35, 0.28);
    speak(s.name + '，' + s.duration + '秒', { interrupt: true });
  } else if (phase === 'done') {
    cancelAnimationFrame(state.tickerId);
    run.classList.add('hidden');
    finish.classList.remove('hidden');
    const msg = ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)];
    $('finishMsg').textContent = msg;
    speak(msg, { interrupt: true });
    beep(988, 0.18, 0.2);
    setTimeout(() => beep(1318, 0.22, 0.2), 200);
  }
  updateRing();
  timeDisplay.textContent = displaySeconds();
  renderDots();
}

// 下一阶段
function advancePhase() {
  if (state.phase === 'prep') {
    state.idx = 0;
    enterPhase('action');
  } else if (state.phase === 'rest') {
    enterPhase('action');
  } else if (state.phase === 'action') {
    state.idx += 1;
    if (state.idx >= stretches.length) {
      enterPhase('done');
    } else {
      enterPhase('rest');
    }
  }
}

// 主循环（基于时间戳，暂停友好）
function tick(ts) {
  if (state.phase === 'idle' || state.phase === 'done') return;
  if (!state.lastTs) state.lastTs = ts;
  const dt = (ts - state.lastTs) / 1000;
  state.lastTs = ts;

  if (!state.paused) {
    state.remaining = Math.max(0, state.remaining - dt);

    // 最后5秒倒计时播报（仅 action 阶段）
    if (state.phase === 'action') {
      const sec = Math.ceil(state.remaining);
      if (sec >= 1 && sec <= 5 && !state.countedDown.has(sec)) {
        state.countedDown.add(sec);
        speak(String(sec));
        beep(660, 0.08, 0.12);
      }
    }
    // 准备阶段每秒播一次数字
    if (state.phase === 'prep') {
      const sec = Math.ceil(state.remaining);
      if (sec >= 1 && sec <= 3 && !state.countedDown.has(sec)) {
        state.countedDown.add(sec);
        speak(String(sec));
        beep(660, 0.08, 0.12);
      }
    }

    timeDisplay.textContent = displaySeconds();
    updateRing();

    if (state.remaining <= 0.001) {
      if (state.phase === 'action') beep(988, 0.15, 0.18);
      advancePhase();
      state.lastTs = performance.now();
    }
  } else {
    state.lastTs = ts;
  }
  state.tickerId = requestAnimationFrame(tick);
}

// 启动
function startWorkout() {
  // 解锁音频（iOS 需在用户手势中创建）
  try { audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  // 预热语音
  speak(' ', { interrupt: true });

  home.classList.add('hidden');
  finish.classList.add('hidden');
  run.classList.remove('hidden');
  state.paused = false;
  pauseBtn.textContent = '暂停';
  state.idx = 0;
  state.lastTs = 0;
  enterPhase('prep');
  cancelAnimationFrame(state.tickerId);
  state.tickerId = requestAnimationFrame(tick);
}

function togglePause() {
  if (state.phase === 'idle' || state.phase === 'done') return;
  state.paused = !state.paused;
  pauseBtn.textContent = state.paused ? '继续' : '暂停';
  if (state.paused) {
    speechSynthesis && speechSynthesis.cancel();
  }
}

function stopWorkout() {
  cancelAnimationFrame(state.tickerId);
  state.phase = 'idle';
  state.paused = false;
  state.idx = 0;
  state.remaining = 0;
  speechSynthesis && speechSynthesis.cancel();
  run.classList.add('hidden');
  finish.classList.add('hidden');
  home.classList.remove('hidden');
  pauseBtn.textContent = '暂停';
}

function resetWorkout() {
  stopWorkout();
  // 稍候重启
  setTimeout(startWorkout, 120);
}

// 按钮绑定
$('startBtn').addEventListener('click', startWorkout);
$('againBtn').addEventListener('click', startWorkout);
pauseBtn.addEventListener('click', togglePause);
nextBtn.addEventListener('click', skipCurrent);

function skipCurrent() {
  if (state.phase === 'idle' || state.phase === 'done') return;
  speechSynthesis && speechSynthesis.cancel();
  beep(784, 0.1, 0.15);
  state.paused = false;
  pauseBtn.textContent = '暂停';
  state.lastTs = 0;
  advancePhase();
}

// 停止键：点击即停止（回到首页）
stopBtn.addEventListener('click', stopWorkout);

// 注册 Service Worker（离线支持）
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

// 初始化
initVoice();
renderDots();
// 防止屏幕休眠（尽力而为）
if ('wakeLock' in navigator) {
  let wl = null;
  const req = async () => { try { wl = await navigator.wakeLock.request('screen'); } catch(e) {} };
  document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') req(); });
  $('startBtn').addEventListener('click', req);
  $('againBtn').addEventListener('click', req);
}
</script>
</body>
</html>
